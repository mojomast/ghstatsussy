# *.ghstats.ussyco.de - per-user report hosts
# Requires a dedicated certificate for ghstats.ussyco.de and *.ghstats.ussyco.de.

server {
    listen 80;
    listen [::]:80;
    server_name *.ghstats.ussyco.de;

    location /.well-known/acme-challenge/ {
        root /home/mojo/web/out;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name *.ghstats.ussyco.de;

    ssl_certificate /etc/letsencrypt/live/ghstats.ussyco.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghstats.ussyco.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
