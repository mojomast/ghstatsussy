services:
  preview-web:
    build: .
    container_name: locscan-preview-web
    ports:
      - "0.0.0.0:8011:8001"
    environment:
      APP_BASE_URL: ""
      APP_SECRET_KEY: preview-secret-key
      DATABASE_URL: sqlite:////app/preview_artifacts/ghstatsussy-preview.db
      REPORT_STORAGE_DIR: /app/preview_artifacts
      SESSION_COOKIE_NAME: ghstatsussy_preview_session
      ALLOW_SAMPLE_REPORTS: "1"
      PROCESS_JOBS_INLINE: "0"
      PREVIEW_MODE: "1"
      PREVIEW_USER_LOGIN: preview-user
      PREVIEW_USER_NAME: Preview User
      GHSTATS_SUBDOMAIN_BASE: preview.ghstats.local
    volumes:
      - ./preview_artifacts:/app/preview_artifacts
